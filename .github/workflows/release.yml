# ============================================================================
# LightC 自动发布工作流
# 当推送 tag (v*) 时自动构建并发布到 GitHub Releases
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LightC v2.10.3'
          releaseBody: |
            ## 更新内容
            - 自 v2.10.3 起，LightC 采用 LightC Source Available License v1.0
            - 源码继续公开用于安全审计、学习、非商业开发和向官方仓库提交贡献
            - 明确禁止改名二次发布、独立修改版发布、商业销售、商业产品捆绑再分发和删除版权/许可证信息

            请查看 [更新日志](https://github.com/Chunyu33/light-c/blob/main/CHANGELOG.md) 了解详细版本变更。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      # tauri-action 已创建 Release 并上传了 MSI + NSIS 安装包
      # 以下额外打包绿色便携版并上传到同一个 Release

      - name: Create portable package
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ReleaseDir = "src-tauri\target\release"
          $PortableDir = "portable_temp"
          $ZipName = "LightC_portable_x64.zip"

          Write-Host "Creating portable package..." -ForegroundColor Cyan

          New-Item -ItemType Directory -Path $PortableDir -Force | Out-Null

          # 主程序
          if (-not (Test-Path "$ReleaseDir\LightC.exe")) {
            Write-Host "Error: LightC.exe not found" -ForegroundColor Red
            exit 1
          }
          Copy-Item "$ReleaseDir\LightC.exe" $PortableDir -Force
          Write-Host "  Copied: LightC.exe" -ForegroundColor White

          # 便携版与安装版复用同一个 exe，通过 marker 让运行时禁用安装器式自动更新。
          Set-Content -Path "$PortableDir\LightC.portable" -Value "portable" -Encoding UTF8
          Write-Host "  Created: LightC.portable" -ForegroundColor White

          # DLL 文件
          $DllFiles = Get-ChildItem -Path $ReleaseDir -Filter "*.dll" -ErrorAction SilentlyContinue
          if ($DllFiles) {
            foreach ($dll in $DllFiles) {
              Copy-Item $dll.FullName $PortableDir -Force
              Write-Host "  Copied: $($dll.Name)" -ForegroundColor White
            }
          }

          # resources 目录
          if (Test-Path "$ReleaseDir\resources") {
            Copy-Item "$ReleaseDir\resources" "$PortableDir\resources" -Recurse -Force
            Write-Host "  Copied: resources/" -ForegroundColor White
          }

          # 官方下载渠道不写死在前端，随 Release 上传 download.json，便于后续调整网盘地址。
          $DownloadConfig = [ordered]@{
            githubReleasesUrl = "https://github.com/Chunyu33/light-c/releases"
            netDiskUrl = "https://pan.quark.cn/s/bce8f722bf33"
            bilibiliUrl = "https://space.bilibili.com/387797235"
            douyinUrl = "https://www.douyin.com/search/Evan%E7%9A%84%E5%83%8F%E7%B4%A0%E7%A9%BA%E9%97%B4"
          }
          $DownloadConfig | ConvertTo-Json | Out-File -FilePath "download.json" -Encoding utf8
          Write-Host "  Created: download.json" -ForegroundColor Green

          # 压缩
          Compress-Archive -Path "$PortableDir\*" -DestinationPath $ZipName -Force
          Write-Host "  Created: $ZipName" -ForegroundColor Green

          # 安装版和便携版复用同一个 LightC.exe；运行时校验当前 exe 字节，因此为 exe 单独生成签名资产。
          $SignatureOutput = npx tauri signer sign "$PortableDir\LightC.exe"
          $GeneratedSigPath = "$PortableDir\LightC.exe.sig"
          if (Test-Path $GeneratedSigPath) {
            $SignatureText = Get-Content -Raw -Path $GeneratedSigPath
            if ($SignatureText.TrimStart().StartsWith("untrusted comment:")) {
              # 原始 minisign 文本需要转成 Tauri updater 风格的 Public signature 字符串。
              $SignatureBase64 = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($SignatureText))
            } else {
              # 有些 CLI 版本会直接写入 Public signature，直接复用可避免双重 base64。
              $SignatureBase64 = $SignatureText.Trim()
            }
          } else {
            # CLI 正常会生成 .sig 文件；这里兜底解析 stdout 中的 Public signature，避免把说明文字写进签名资产。
            $SignatureBase64 = ($SignatureOutput -split "`r?`n" | Where-Object { $_ -match '^[A-Za-z0-9+/=]+$' } | Select-Object -Last 1)
            if (-not $SignatureBase64) {
              Write-Host "Error: signature output not found" -ForegroundColor Red
              exit 1
            }
          }
          $SignatureBase64 | Out-File -FilePath "LightC_installer_exe.sig" -Encoding utf8 -NoNewline
          $SignatureBase64 | Out-File -FilePath "LightC_portable_exe.sig" -Encoding utf8 -NoNewline
          Write-Host "  Created: LightC_installer_exe.sig" -ForegroundColor Green
          Write-Host "  Created: LightC_portable_exe.sig" -ForegroundColor Green

          # 清理临时目录
          Remove-Item $PortableDir -Recurse -Force

          # 输出文件名供后续步骤使用
          echo "portable_zip=$ZipName" >> $env:GITHUB_OUTPUT
        id: portable

      - name: Upload portable to release
        shell: pwsh
        run: |
          $ZipPath = "LightC_portable_x64.zip"
          $InstallerSigPath = "LightC_installer_exe.sig"
          $PortableSigPath = "LightC_portable_exe.sig"
          $DownloadConfigPath = "download.json"
          if ((Test-Path $ZipPath) -and (Test-Path $InstallerSigPath) -and (Test-Path $PortableSigPath) -and (Test-Path $DownloadConfigPath)) {
            Write-Host "Uploading portable assets to release..." -ForegroundColor Cyan
            gh release upload ${{ github.ref_name }} $ZipPath $InstallerSigPath $PortableSigPath $DownloadConfigPath --clobber
            Write-Host "Upload done!" -ForegroundColor Green
          } else {
            Write-Host "Error: portable zip, exe signatures or download config not found" -ForegroundColor Red
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
